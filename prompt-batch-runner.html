<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Batch Runner</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>html,body{margin:0;padding:0;background:#09090b;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useRef, useCallback } = React;

const DEFAULT_PROMPTS = [
  "Summarize this content in 3 bullet points.",
  "What are the key insights or takeaways?",
  "Identify any weaknesses, gaps, or issues.",
  "Rewrite this in a clear, professional tone.",
];

const STATUS = { IDLE: "idle", WAITING: "waiting", LOADING: "loading", DONE: "done", ERROR: "error" };

function Spinner({ color = "#a78bfa" }) {
  return (
    <svg width="15" height="15" viewBox="0 0 16 16" style={{ animation: "spin 0.8s linear infinite", flexShrink: 0 }}>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <circle cx="8" cy="8" r="6" fill="none" stroke={color} strokeWidth="2.5" strokeDasharray="20 18" />
    </svg>
  );
}

async function callClaude(messages, apiKey) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      // Required to call the API directly from a browser (local dev only).
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-opus-4-8",
      max_tokens: 16000,
      // Opus 4.8: budget_tokens is gone. Effort lives in output_config and
      // pairs with adaptive thinking. "high" is already the Opus 4.8 default;
      // set explicitly here for clarity. Lower to "medium"/"low" to cut cost.
      thinking: { type: "adaptive" },
      output_config: { effort: "high" },
      messages,
    }),
  });
  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${response.status}`);
  }
  const data = await response.json();
  // Keep only text blocks; adaptive thinking may also return thinking blocks.
  return data.content
    .filter(b => b.type === "text")
    .map(b => b.text)
    .join("\n");
}

// Build the user content array for a prompt, given file state and text input
function buildUserContent(promptText, file, textInput) {
  if (!file) {
    return `${promptText}\n\n---\n\n${textInput}`;
  }
  if (file.kind === "html" || file.kind === "text") {
    // Send as text document
    return [
      {
        type: "document",
        source: { type: "text", media_type: "text/plain", data: file.textContent },
        title: file.name,
      },
      { type: "text", text: promptText },
    ];
  }
  if (file.kind === "pdf") {
    return [
      { type: "document", source: { type: "base64", media_type: "application/pdf", data: file.base64 } },
      { type: "text", text: promptText },
    ];
  }
  if (file.kind === "image") {
    return [
      { type: "image", source: { type: "base64", media_type: file.type, data: file.base64 } },
      { type: "text", text: promptText },
    ];
  }
  return `${promptText}\n\n---\n\n${textInput}`;
}

function App() {
  const [input, setInput] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [prompts, setPrompts] = useState(DEFAULT_PROMPTS);
  const [results, setResults] = useState(DEFAULT_PROMPTS.map(() => ({ status: STATUS.IDLE, text: "" })));
  const [isRunning, setIsRunning] = useState(false);
  const [currentStep, setCurrentStep] = useState(null);
  const [file, setFile] = useState(null);
  const [finalHtml, setFinalHtml] = useState(null);
  const [generatingFinal, setGeneratingFinal] = useState(false);
  const fileInputRef = useRef();
  const abortRef = useRef(false);

  const updatePrompt = useCallback((i, val) => {
    setPrompts(prev => prev.map((p, idx) => idx === i ? val : p));
  }, []);

  const addPrompt = () => {
    if (prompts.length >= 8) return;
    setPrompts(prev => [...prev, ""]);
    setResults(prev => [...prev, { status: STATUS.IDLE, text: "" }]);
  };

  const removePrompt = () => {
    if (prompts.length <= 1) return;
    setPrompts(prev => prev.slice(0, -1));
    setResults(prev => prev.slice(0, -1));
  };

  const handleFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;

    const name = f.name.toLowerCase();
    const isHtml = name.endsWith(".html") || name.endsWith(".htm");
    const isText = f.type.startsWith("text/") && !isHtml;
    const isPdf  = f.type === "application/pdf";
    const isImg  = f.type.startsWith("image/");

    if (!isHtml && !isText && !isPdf && !isImg) {
      alert("Supported: HTML, PDF, images (PNG/JPG/WEBP/GIF), or plain text files.");
      return;
    }

    const reader = new FileReader();

    if (isHtml || isText) {
      reader.onload = () => {
        setFile({
          name: f.name,
          kind: isHtml ? "html" : "text",
          textContent: reader.result,
          type: f.type,
        });
      };
      reader.readAsText(f);
    } else {
      reader.onload = () => {
        setFile({
          name: f.name,
          kind: isPdf ? "pdf" : "image",
          base64: reader.result.split(",")[1],
          type: f.type,
        });
      };
      reader.readAsDataURL(f);
    }
  };

  const removeFile = () => {
    setFile(null);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const setResult = (i, update) =>
    setResults(prev => prev.map((r, idx) => idx === i ? { ...r, ...update } : r));

  const runAll = async () => {
    if (!apiKey.trim()) { alert("Paste your Anthropic API key first."); return; }
    if (!apiKey.trim() || (!input.trim() && !file)) return;
    abortRef.current = false;
    setIsRunning(true);
    setFinalHtml(null);
    setCurrentStep(0);
    setResults(prompts.map((_, i) => ({ status: i === 0 ? STATUS.LOADING : STATUS.WAITING, text: "" })));

    const collected = [];

    for (let i = 0; i < prompts.length; i++) {
      if (abortRef.current) break;
      setCurrentStep(i);
      setResult(i, { status: STATUS.LOADING, text: "" });

      try {
        const userContent = buildUserContent(prompts[i], file, input);
        const text = await callClaude([{ role: "user", content: userContent }], apiKey);
        setResult(i, { status: STATUS.DONE, text });
        collected.push({ prompt: prompts[i], result: text });
      } catch (err) {
        setResult(i, { status: STATUS.ERROR, text: err.message });
        collected.push({ prompt: prompts[i], result: `[Error: ${err.message}]` });
      }

      if (i + 1 < prompts.length && !abortRef.current) {
        setResult(i + 1, { status: STATUS.LOADING, text: "" });
      }
    }

    setCurrentStep(null);
    setIsRunning(false);

    if (!abortRef.current) {
      setGeneratingFinal(true);
      try {
        const sectionsText = collected.map((c, i) =>
          `## Prompt ${i + 1}: ${c.prompt}\n\n${c.result}`
        ).join("\n\n---\n\n");

        const finalPrompt = `You are given results from ${collected.length} sequential AI prompts run on the same content.
Combine them into a single, beautiful, fully self-contained HTML page.

Requirements:
- Fully self-contained (no external dependencies, all CSS inline or in <style>)
- Clean modern dark theme with great typography (use system fonts)
- Each prompt result in its own clearly labeled card/section with the prompt shown as a subtitle
- A header with title "Analysis Report" and a subtitle showing ${collected.length} sections
- Responsive layout, good spacing, readable at any width
- ONLY return raw HTML — no markdown fences, no explanation, no backticks

Here are the results:

${sectionsText}`;

        const html = await callClaude([{ role: "user", content: finalPrompt }], apiKey);
        const cleaned = html.replace(/^```html?\n?/i, "").replace(/\n?```$/i, "").trim();
        setFinalHtml(cleaned);
      } catch (err) {
        setFinalHtml(`<html><body style="font-family:sans-serif;padding:2rem;color:#f87171;background:#09090b"><h2>Failed to generate report: ${err.message}</h2></body></html>`);
      }
      setGeneratingFinal(false);
    }
  };

  const stop = () => { abortRef.current = true; };

  const reset = () => {
    setResults(prompts.map(() => ({ status: STATUS.IDLE, text: "" })));
    setCurrentStep(null);
    setFinalHtml(null);
  };

  const openInNewTab = () => {
    if (!finalHtml) return;
    const blob = new Blob([finalHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");
  };

  const downloadHtml = () => {
    if (!finalHtml) return;
    const blob = new Blob([finalHtml], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "analysis-report.html";
    a.click();
  };

  const hasResults = results.some(r => r.status !== STATUS.IDLE);

  const fileIcon = (kind) => ({ html: "🌐", pdf: "📄", image: "🖼️", text: "📝" })[kind] || "📁";

  return (
    <div style={{
      minHeight: "100vh", background: "#09090b", color: "#e4e4e7",
      fontFamily: "'Inter', system-ui, sans-serif", padding: "28px 18px", boxSizing: "border-box",
    }}>
      <div style={{ maxWidth: 760, margin: "0 auto" }}>

        {/* Header */}
        <div style={{ marginBottom: 24 }}>
          <h1 style={{ margin: "0 0 4px", fontSize: 19, fontWeight: 700, color: "#fafafa", letterSpacing: -0.4, display: "flex", alignItems: "center", gap: 9 }}>
            <span>⚡</span> Prompt Batch Runner
          </h1>
          <p style={{ margin: 0, color: "#71717a", fontSize: 12.5 }}>
            Runs prompts 1 → {prompts.length} in order, then generates a final HTML report.
          </p>
        </div>

        {/* API key */}
        <div style={{ marginBottom: 18 }}>
          <div style={labelStyle}>Your Anthropic API key</div>
          <input
            type="password"
            value={apiKey}
            onChange={e => setApiKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{
              width: "100%", background: "#18181b", border: `1px solid ${apiKey ? "#7c3aed" : "#3f3f46"}`,
              borderRadius: 10, color: "#e4e4e7", fontSize: 13,
              fontFamily: "monospace", padding: "11px 14px", outline: "none", boxSizing: "border-box",
            }}
          />
          <div style={{ color: "#52525b", fontSize: 11, marginTop: 6 }}>
            Stored only in this browser tab while you use it. Get one at console.anthropic.com → API keys.
          </div>
        </div>

        {/* Input */}
        <div style={{ marginBottom: 18 }}>
          <div style={labelStyle}>Input / Content</div>

          <div
            onClick={() => fileInputRef.current?.click()}
            style={{
              border: `1.5px dashed ${file ? "#7c3aed" : "#3f3f46"}`,
              borderRadius: 10, padding: "12px 16px",
              background: file ? "#1a0533" : "#111113",
              cursor: "pointer", marginBottom: 10,
              display: "flex", alignItems: "center", gap: 12,
            }}
          >
            <span style={{ fontSize: 20 }}>{file ? fileIcon(file.kind) : "📁"}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              {file ? (
                <>
                  <div style={{ color: "#c4b5fd", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{file.name}</div>
                  <div style={{ color: "#71717a", fontSize: 11, marginTop: 1 }}>
                    {file.kind === "html" ? "HTML artifact" : file.kind === "pdf" ? "PDF document" : file.kind === "image" ? "Image" : "Text file"} · Click to replace
                  </div>
                </>
              ) : (
                <>
                  <div style={{ color: "#a1a1aa", fontSize: 13, fontWeight: 500 }}>Attach a file</div>
                  <div style={{ color: "#52525b", fontSize: 11, marginTop: 1 }}>HTML, PDF, PNG, JPG, WEBP, GIF, or plain text</div>
                </>
              )}
            </div>
            {file && (
              <button onClick={e => { e.stopPropagation(); removeFile(); }}
                style={{ background: "none", border: "none", color: "#71717a", cursor: "pointer", fontSize: 16, padding: "0 4px" }}>✕</button>
            )}
          </div>
          <input ref={fileInputRef} type="file" accept=".html,.htm,.pdf,.txt,image/*" onChange={handleFile} style={{ display: "none" }} />

          <div style={{ color: "#3f3f46", fontSize: 11, textAlign: "center", marginBottom: 8 }}>— or paste text below —</div>

          <textarea
            value={input}
            onChange={e => setInput(e.target.value)}
            placeholder="Paste your article, email, code, or any text here…"
            rows={5}
            style={{
              width: "100%", background: "#18181b", border: "1px solid #3f3f46",
              borderRadius: 10, color: "#e4e4e7", fontSize: 13,
              fontFamily: "inherit", padding: "11px 14px", outline: "none",
              resize: "vertical", lineHeight: 1.6, boxSizing: "border-box",
            }}
          />
        </div>

        {/* Prompts */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={labelStyle}>Prompts — run in order</div>
            <div style={{ display: "flex", gap: 7 }}>
              {prompts.length > 1 && <button onClick={removePrompt} style={smallBtn("#3f3f46", "#71717a")}>− Remove</button>}
              {prompts.length < 8 && <button onClick={addPrompt} style={smallBtn("#3f3f46", "#a78bfa")}>+ Add</button>}
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {prompts.map((p, i) => {
              const r = results[i];
              const isActive = currentStep === i;
              const borderColor = isActive ? "#7c3aed" : r.status === "done" ? "#166534" : r.status === "error" ? "#7f1d1d" : "#27272a";
              return (
                <div key={i} style={{
                  background: "#18181b", border: `1px solid ${borderColor}`,
                  borderRadius: 10, overflow: "hidden",
                  boxShadow: isActive ? "0 0 0 2px #3b0764" : "none",
                  transition: "border-color 0.2s, box-shadow 0.2s",
                }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "11px 13px" }}>
                    <span style={{
                      fontFamily: "monospace", fontSize: 11,
                      color: isActive ? "#fff" : "#a78bfa",
                      background: isActive ? "#7c3aed" : "#2e1065",
                      borderRadius: 5, padding: "2px 7px", marginTop: 2,
                      flexShrink: 0, fontWeight: 700, letterSpacing: 1, transition: "background 0.2s",
                    }}>P{i + 1}</span>
                    <textarea
                      value={p}
                      onChange={e => updatePrompt(i, e.target.value)}
                      rows={2}
                      placeholder={`Prompt ${i + 1}…`}
                      style={{
                        flex: 1, background: "transparent", border: "none",
                        outline: "none", color: "#e4e4e7", fontSize: 13,
                        fontFamily: "inherit", resize: "vertical", lineHeight: 1.5,
                      }}
                    />
                    <span style={{
                      background: { idle: "#27272a", waiting: "#1c1917", loading: "#2e1065", done: "#14532d", error: "#7f1d1d" }[r.status],
                      color: { idle: "#52525b", waiting: "#78716c", loading: "#a78bfa", done: "#4ade80", error: "#f87171" }[r.status],
                      borderRadius: 5, padding: "2px 8px", fontSize: 11, fontWeight: 700,
                      display: "flex", alignItems: "center", gap: 5, flexShrink: 0,
                    }}>
                      {r.status === "loading" && <Spinner />}
                      {{ idle: "Ready", waiting: "Queued", loading: "Running", done: "Done", error: "Error" }[r.status]}
                    </span>
                  </div>

                  {r.status !== STATUS.IDLE && r.status !== STATUS.WAITING && (
                    <div style={{ borderTop: "1px solid #27272a", padding: "11px 14px", background: "#111113" }}>
                      {r.status === STATUS.LOADING && (
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <Spinner /><span style={{ color: "#71717a", fontSize: 12 }}>Generating…</span>
                        </div>
                      )}
                      {r.status === STATUS.ERROR && <p style={{ color: "#f87171", fontSize: 12.5, margin: 0 }}>⚠ {r.text}</p>}
                      {r.status === STATUS.DONE && (
                        <div>
                          <p style={{ color: "#d4d4d8", fontSize: 13, margin: "0 0 8px", lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{r.text}</p>
                          <CopyBtn text={r.text} />
                        </div>
                      )}
                    </div>
                  )}
                  {r.status === STATUS.WAITING && (
                    <div style={{ borderTop: "1px solid #27272a", padding: "8px 14px", background: "#111113" }}>
                      <span style={{ color: "#52525b", fontSize: 12 }}>Waiting for P{i} to finish…</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Buttons */}
        <div style={{ display: "flex", gap: 10, marginBottom: 28 }}>
          <button
            onClick={runAll}
            disabled={isRunning || generatingFinal || (!apiKey.trim() || (!input.trim() && !file))}
            style={{
              flex: 1,
              background: (isRunning || generatingFinal || (!apiKey.trim() || (!input.trim() && !file))) ? "#27272a" : "linear-gradient(135deg, #7c3aed, #a78bfa)",
              color: (isRunning || generatingFinal || (!apiKey.trim() || (!input.trim() && !file))) ? "#52525b" : "#fff",
              border: "none", borderRadius: 10, padding: "13px 0",
              fontSize: 14, fontWeight: 700,
              cursor: (isRunning || generatingFinal || (!apiKey.trim() || (!input.trim() && !file))) ? "not-allowed" : "pointer",
            }}
          >
            {isRunning
              ? `Running P${(currentStep ?? 0) + 1} of ${prompts.length}…`
              : generatingFinal ? "Building final report…"
              : `▶  Run ${prompts.length} Prompts → Generate Report`}
          </button>
          {isRunning && (
            <button onClick={stop} style={{ background: "none", border: "1px solid #7f1d1d", color: "#f87171", borderRadius: 10, padding: "13px 18px", fontSize: 13, cursor: "pointer" }}>Stop</button>
          )}
          {hasResults && !isRunning && !generatingFinal && (
            <button onClick={reset} style={{ background: "none", border: "1px solid #3f3f46", color: "#71717a", borderRadius: 10, padding: "13px 18px", fontSize: 13, cursor: "pointer" }}>Reset</button>
          )}
        </div>

        {/* Generating indicator */}
        {generatingFinal && (
          <div style={{
            background: "#0f0a1e", border: "1px solid #4c1d95", borderRadius: 12, padding: "18px 20px",
            display: "flex", alignItems: "center", gap: 12,
          }}>
            <Spinner color="#c4b5fd" />
            <div>
              <div style={{ color: "#c4b5fd", fontSize: 13, fontWeight: 600 }}>Generating final HTML report…</div>
              <div style={{ color: "#6d28d9", fontSize: 11, marginTop: 2 }}>Combining all {prompts.length} results into one artifact</div>
            </div>
          </div>
        )}

        {/* Final Report */}
        {finalHtml && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#c4b5fd" }}>✦ Final Report Ready</div>
                <div style={{ fontSize: 11, color: "#6d28d9", marginTop: 2 }}>{prompts.length} sections combined into one HTML artifact</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={openInNewTab} style={{
                  background: "linear-gradient(135deg, #4c1d95, #7c3aed)",
                  color: "#fff", border: "none",
                  borderRadius: 7, padding: "6px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer",
                }}>
                  🔗 Open in New Tab
                </button>
                <button onClick={downloadHtml} style={smallBtn("#4c1d95", "#c4b5fd")}>↓ Download</button>
                <CopyBtn text={finalHtml} label="Copy HTML" />
              </div>
            </div>

            {/* HTML source preview */}
            <div style={{
              background: "#0d0d0f", border: "1px solid #27272a", borderRadius: 10,
              padding: "14px 16px", maxHeight: 200, overflowY: "auto",
            }}>
              <pre style={{ margin: 0, fontSize: 11, color: "#52525b", fontFamily: "monospace", whiteSpace: "pre-wrap", wordBreak: "break-all" }}>
                {finalHtml.slice(0, 800)}{finalHtml.length > 800 ? "\n…" : ""}
              </pre>
            </div>
            <div style={{ marginTop: 8, fontSize: 11, color: "#3f3f46", textAlign: "right" }}>
              {finalHtml.length.toLocaleString()} characters · Click "Open in New Tab" to view rendered
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

function CopyBtn({ text, label = "Copy" }) {
  const [copied, setCopied] = useState(false);
  return (
    <button
      onClick={() => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      style={{
        background: "none", border: "1px solid #3f3f46",
        color: copied ? "#4ade80" : "#71717a",
        borderRadius: 6, padding: "3px 11px", fontSize: 11, cursor: "pointer",
      }}
    >{copied ? "Copied!" : label}</button>
  );
}

const labelStyle = {
  fontSize: 11, color: "#a1a1aa", fontWeight: 600,
  textTransform: "uppercase", letterSpacing: 0.8,
  display: "block", marginBottom: 8,
};

const smallBtn = (border, color) => ({
  background: "none", border: `1px solid ${border}`, color,
  borderRadius: 7, padding: "4px 11px", fontSize: 12, cursor: "pointer",
});

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
